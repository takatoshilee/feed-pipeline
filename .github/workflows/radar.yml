name: job-radar
on:
  schedule:
    - cron: "0 8 * * *"    # once-daily BACKUP; the real cadence comes from an external
                            # cron (cron-job.org) hitting the workflow_dispatch API, which
                            # isn't throttled like GH schedules and doesn't double-spend minutes
  workflow_dispatch: {}        # manual + external-cron trigger

permissions:
  contents: read

concurrency:
  group: radar
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 14   # never bleed into the next 15-min cron window (queue serializes runs)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip                      # cache wheels (boto3 etc.) so frequent runs stay short
          cache-dependency-path: pyproject.toml

      # Restore the seen-set from the most recent prior run. The key is unique per
      # run so a fresh cache is always saved at job end; restore-keys grabs the latest.
      - name: Restore seen-set
        uses: actions/cache@v4
        with:
          path: .state
          key: seen-${{ github.run_id }}
          restore-keys: |
            seen-

      - run: pip install -e ".[sheet,bedrock]"

      # Materialize the service-account key (if the secret is set) so the poll can
      # mirror matches into the Google Sheet. No secret => the file is absent and the
      # Sheet is silently skipped; Discord pings still work.
      - name: Write Google credentials
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          if [ -n "$GOOGLE_CREDENTIALS" ]; then
            printf '%s' "$GOOGLE_CREDENTIALS" > google-creds.json
            echo "wrote google-creds.json"
          else
            echo "no GOOGLE_CREDENTIALS secret; Sheet mirroring disabled"
          fi

      - name: Run radar
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          DISCORD_ROLE_ID: ${{ secrets.DISCORD_ROLE_ID }}
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}   # boto3 region fallback (no ~/.aws in CI)
          SEEN_PATH: .state/seen.json
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS_PATH: google-creds.json
        run: |
          set -o pipefail
          python -m job_radar | tee run.log
          { echo '```'; tail -3 run.log; echo '```'; } >> "$GITHUB_STEP_SUMMARY"
