name: job-radar reminders
on:
  schedule:
    - cron: "0 13 * * *"   # daily ~9am ET (13:00 UTC); GH may delay under load
  workflow_dispatch: {}        # manual run button

permissions:
  contents: read

jobs:
  remind:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -e ".[sheet]"

      - name: Write Google credentials
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          if [ -n "$GOOGLE_CREDENTIALS" ]; then
            printf '%s' "$GOOGLE_CREDENTIALS" > google-creds.json
          else
            echo "no GOOGLE_CREDENTIALS secret; cannot read the Sheet"; exit 1
          fi

      - name: Send reminders
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS_PATH: google-creds.json
        run: python -m job_radar.remind
