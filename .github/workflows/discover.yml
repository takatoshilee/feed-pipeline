name: job-radar discover
on:
  schedule:
    - cron: "0 8 * * 1"   # weekly, Monday 08:00 UTC
  workflow_dispatch:
    inputs:
      max_add:
        description: "max boards to add this run"
        default: "40"

permissions:
  contents: read           # the grown watch-list is committed to the private
                           # config repo (via its deploy key), not this one

concurrency:
  group: radar-discover
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Fetch private config
        uses: actions/checkout@v4
        with:
          repository: takatoshilee/job-radar-config
          ssh-key: ${{ secrets.CONFIG_DEPLOY_KEY }}
          path: .private-config
      - name: Install private config
        run: |
          cp .private-config/companies.yaml config/companies.yaml
          cp .private-config/profile.yaml config/profile.yaml

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .

      - name: Discover relevant new boards
        run: python -m job_radar.discover --max-add "${MAX_ADD:-40}"
        env:
          MAX_ADD: ${{ github.event.inputs.max_add }}

      - name: Commit any additions (to the private config repo)
        run: |
          if ! git diff --quiet --no-index .private-config/companies.yaml config/companies.yaml; then
            n=$(git diff --no-index .private-config/companies.yaml config/companies.yaml | grep -c '^+- slug:' || true)
            cp config/companies.yaml .private-config/companies.yaml
            cd .private-config
            git config user.name "job-radar-bot"
            git config user.email "actions@github.com"
            git add companies.yaml
            git commit -m "Auto-discover: add ${n} relevant new board(s)"
            git push
          else
            echo "no new relevant boards this week"
          fi
