summary: >
  Second-year Computer Science student at the University of Toronto (co-op stream),
  graduating December 2028. He is a STUDENT seeking EITHER a 4-month summer internship OR a
  12-16 month co-op work term, starting in 2027 OR 2028 (his main co-op runs ~May 2027 to
  Aug 2028; he is also open to a Summer 2027 internship and Summer 2028 roles). Both
  internships and co-ops are equally wanted. Scoring rules:
  - HARD GATE — must be a STUDENT role: the posting MUST be an internship, co-op, industrial
    placement, or otherwise explicitly open to current students/undergraduates (its title or
    description should say intern / co-op / student / "currently pursuing a degree"). If a
    posting shows NO such signal — e.g. a plain "Software Engineer", "Software Engineer,
    Backend", or "Data Scientist" with no intern/co-op/student language — treat it as a
    FULL-TIME role he is NOT eligible for and score it 30 or below, however well the skills
    or company match. He is a 2nd-year undergrad and can only take student work terms.
  - TIMING: GOOD is a 2027 OR 2028 start — Summer 2027, Fall 2027, a 2027-2028 co-op,
    Summer 2028, etc. — AND any intern/co-op role that states no year (treat undated student
    roles as fine). BAD (score low) is a 2026-or-earlier start: Summer 2026, Fall 2026,
    Winter 2026, "New Grad 2026"; he is committed to research and classes through all of 2026.
  - WRONG LEVEL (score low): roles that REQUIRE a completed or in-progress Master's, PhD,
    or other graduate degree. He is a BACHELOR's student and will not have a Master's.
    Roles open to Bachelor's students (even if they also welcome Master's/PhD applicants)
    are perfectly fine.
  - CAN'T DO (score low): roles requiring US citizenship, a US security clearance,
    permanent residency, "US person" status, or that state "no visa sponsorship" / "must be
    authorized to work in the US without sponsorship". He is an international student and
    cannot meet these. A US role that does NOT say this is still fine (he'd just need
    sponsorship); only the explicit citizenship/clearance/no-sponsorship ones are out.
  Strong in Python, TypeScript/React, full-stack web, and LLM application development; some
  applied ML. Based in Toronto; open to remote within Canada/North America and to US on-site
  (would need visa sponsorship, fine to apply anyway). Penalize senior/staff/manager roles
  and anything requiring 3+ years of experience or security clearance.

title_include:
  - intern
  - internship
  - co-op
  - "co op"
  - coop
  - "new grad"
  - "new-grad"
  - "early career"
  - student
  - software
  - swe
  - "machine learning"
  - " ml "
  - " ai "
  - data
  - backend
  - "full stack"
  - "full-stack"
  - developer
  - engineer

title_exclude:
  - senior
  - "sr."
  - staff
  - principal
  - lead
  - manager
  - director
  - "vp "
  - "head of"
  - " ii"
  - " iii"
  - " iv"
  - architect
  - "5+ years"
  - "6+ years"
  - "7+ years"
  - "8+ years"
  - clearance
  - phd
  - postdoc
  # Non-technical role types (from the tuning analysis; high-precision, never appear in
  # SWE/AI/Data titles). See TUNING_RECOMMENDATIONS.md for medium-confidence candidates.
  - coordinator
  - administrative
  - advisor
  - partnership
  - counsel
  - representative
  - designer
  - portfolio
  - "it systems"
  - "provider data operations"
  - recruiter
  - treasury
  - sales

locations_allow:
  # International student with a Toronto lease through Jul 2027. US on-site is OFF the table for
  # 2027 (no TN without citizenship, no CPT/OPT without US enrollment), and on-site would also
  # mean breaking the lease, so US cities are cut. Canada + remote only; "remote" still catches
  # US-remote roles he could do from Toronto. Foreign locations stay cut by the block-list.
  - toronto
  - ontario
  - canada
  - canadian
  - waterloo
  - montreal
  - vancouver
  - ottawa
  - remote
  - "north america"

# Block foreign locations (countries/regions only; no city names that collide with North
# America, e.g. London -> London, Ontario). Token-aware: "india" blocks "India - Remote" but
# not "Indiana"; "united kingdom" matches as a phrase. This stops roles that need local work
# authorization from leaking in via the "remote" allow term.
locations_block:
  - india
  - "united kingdom"
  - uk          # token-aware: blocks "London, UK" but not "Ukraine"
  - "u.k."
  - england
  - ireland
  - germany
  - france
  - spain
  - netherlands
  - poland
  - portugal
  - italy
  - switzerland
  - sweden
  - norway
  - denmark
  - singapore
  - australia
  - "new zealand"
  - japan
  - korea
  - china
  - taiwan
  - "hong kong"
  - philippines
  - indonesia
  - malaysia
  - vietnam
  - thailand
  - brazil
  - argentina
  - colombia
  - mexico
  - israel
  - "united arab emirates"
  - "saudi arabia"
  - emea
  - apac
  - latam
  - "asia pacific"
  - bengaluru
  - bangalore
  - hyderabad
  - pune

freshness_days: 21
# Discord pings only for genuinely strong matches (Sonnet scores good 2027 intern/co-op
# roles ~78-92). Everything 60+ still goes to the Sheet + the daily digest; this just keeps
# the real-time pings high-signal. digest_threshold == ping_threshold disables the noisy
# per-run digest (the once-a-day reminder is the summary).
ping_threshold: 78
digest_threshold: 78
high_score: 82
high_fresh_hours: 2
