summary: >
  Second-year Computer Science student at the University of Toronto (co-op stream),
  graduating December 2028. He is a STUDENT seeking an INTERNSHIP or 12-16 month CO-OP
  work term that STARTS IN 2027 (around May 2027, running through Aug 2028); after it he
  returns to university for his final year. Scoring rules:
  - GOOD: internship / co-op / industrial-placement / student work-term roles for 2027,
    or with no stated year/season.
  - WRONG TIMING (score low however good the role is): any 2026 start — Summer 2026,
    Fall 2026, Winter 2026, or "New Grad 2026" — he is committed to research and classes
    through all of 2026.
  - WRONG TYPE (score low): full-time / permanent / "New Grad" / entry-level-career roles.
    He does not graduate until Dec 2028, so these are for ~2028-2029, not his 2027 co-op;
    only score them well if they explicitly accept current students or co-op candidates.
  Strong in Python, TypeScript/React, full-stack web, and LLM application development; some
  applied ML. Based in Toronto; open to remote within Canada/North America and to US on-site
  (would need visa sponsorship, fine to apply anyway). Penalize senior/staff/manager roles
  and anything requiring 3+ years of experience or security clearance.

title_include:
  - intern
  - internship
  - co-op
  - "co op"
  - coop
  - "new grad"
  - "new-grad"
  - "early career"
  - student
  - software
  - swe
  - "machine learning"
  - " ml "
