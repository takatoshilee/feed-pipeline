summary: >
  Second-year Computer Science student at the University of Toronto (co-op stream),
  graduating December 2028. RECRUITING NOW for roles that START IN 2027: a 12-16 month
  co-op beginning around May 2027 (running through Aug 2028), or a Summer 2027 internship.
  NOT available for any 2026 start date (committed to research and coursework through all
  of 2026), so postings for Summer 2026, Fall 2026, Winter 2026, or "New Grad 2026" are
  the WRONG TIMING and should score low no matter how good the role is; roles targeting
  2027 (or 2028), or with no stated year/season, are good. Strong in Python,
  TypeScript/React, full-stack web, and LLM application development; some applied ML.
  Based in Toronto; open to remote within Canada/North America and to US on-site (would
  need visa sponsorship, fine to apply anyway). Penalize senior/staff/manager roles and
  anything requiring 3+ years of experience or security clearance.

