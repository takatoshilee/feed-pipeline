summary: >
  Second-year Computer Science student at the University of Toronto (co-op stream),
  graduating December 2028. Seeking software engineering, AI/ML, and data internships
  and 12-16 month co-op terms (Summer 2026, 2027). Strong in Python, TypeScript/React,
  full-stack web, and LLM application development; some applied ML. Based in Toronto;
  open to remote within Canada and North America. Penalize senior/staff/manager roles
  and anything requiring 3+ years of experience or security clearance.

title_include:
  - intern
  - internship
  - co-op
  - "co op"
  - coop
  - "new grad"
  - "new-grad"
  - "early career"
  - student
  - software
  - swe
  - "machine learning"
  - " ml "
  - " ai "
  - data
  - backend
  - "full stack"
  - "full-stack"
  - developer
  - engineer

title_exclude:
  - senior
  - "sr."
  - staff
  - principal
  - lead
  - manager
  - director
  - "vp "
  - "head of"
  - " ii"
  - " iii"
  - " iv"
  - architect
  - "5+ years"
  - "6+ years"
  - "7+ years"
  - "8+ years"
  - clearance
  - phd
  - postdoc
  # Non-technical role types (from the tuning analysis; high-precision, never appear in
  # SWE/AI/Data titles). See TUNING_RECOMMENDATIONS.md for medium-confidence candidates.
  - coordinator
  - administrative
  - advisor
  - partnership
  - counsel
  - representative
  - designer
  - portfolio
  - "it systems"
  - "provider data operations"
  - recruiter
  - treasury
  - sales

locations_allow:
  # International student: viable = anywhere in Canada + remote (incl. working remotely from
  # Canada for a US/foreign company). US ON-SITE roles need visa sponsorship, so they're
  # intentionally NOT allowed here (they get filtered out); US/foreign REMOTE still passes
  # via "remote", and foreign-remote that needs local authorization is cut by the block-list.
  - toronto
  - ontario
  - canada
  - canadian
  - waterloo
  - montreal
  - vancouver
  - ottawa
  - remote
  - "north america"

# Block foreign locations (countries/regions only; no city names that collide with North
# America, e.g. London -> London, Ontario). Token-aware: "india" blocks "India - Remote" but
# not "Indiana"; "united kingdom" matches as a phrase. This stops roles that need local work
# authorization from leaking in via the "remote" allow term.
locations_block:
  - india
  - "united kingdom"
  - uk          # token-aware: blocks "London, UK" but not "Ukraine"
  - "u.k."
  - england
  - ireland
  - germany
  - france
  - spain
  - netherlands
  - poland
  - portugal
  - italy
  - switzerland
  - sweden
  - norway
  - denmark
  - singapore
  - australia
  - "new zealand"
  - japan
  - korea
  - china
  - taiwan
  - "hong kong"
  - philippines
  - indonesia
  - malaysia
  - vietnam
  - thailand
  - brazil
  - argentina
  - colombia
  - mexico
  - israel
  - "united arab emirates"
  - "saudi arabia"
  - emea
  - apac
  - latam
  - "asia pacific"
  - bengaluru
  - bangalore
  - hyderabad
  - pune

freshness_days: 21
ping_threshold: 65
digest_threshold: 50
high_score: 80
high_fresh_hours: 2
