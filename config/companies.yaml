# The watch-list. Each entry: slug + ats + tier (dream|target).
#   ats: greenhouse | lever | ashby | workday | smartrecruiters
# Verify a slug by opening its board:
#   greenhouse      -> https://boards.greenhouse.io/<slug>
#   lever           -> https://jobs.lever.co/<slug>
#   ashby           -> https://jobs.ashbyhq.com/<slug>
#   smartrecruiters -> https://jobs.smartrecruiters.com/<slug>
#   workday         -> needs wd_host + wd_site too (open careers page, watch the
#                      /wday/cxs/<tenant>/<site>/jobs request; host is e.g. wd5)
# Wrong slugs 404 and are skipped, so it's safe to grow this freely.
# To bulk-add from a list:  python -m job_radar.seed <list.csv>
